services:
  yuehou:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-阅后即焚}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.1}
    container_name: yuehou
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.1}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-阅后即焚}
      REDIS_URL: redis://redis:6379
      YUEHOU_DOCKER_UPDATE_ENABLED: ${YUEHOU_DOCKER_UPDATE_ENABLED:-false}
      YUEHOU_HOST_PROJECT_DIR: ${YUEHOU_HOST_PROJECT_DIR:-/opt/yuehou}
      YUEHOU_UPDATE_TOKEN: ${YUEHOU_UPDATE_TOKEN:-}
      YUEHOU_UPDATE_VERSION_URL: ${YUEHOU_UPDATE_VERSION_URL:-https://raw.githubusercontent.com/hmbbser/yuehou1/main/package.json}
      YUEHOU_UPDATE_WORKDIR: ${YUEHOU_HOST_PROJECT_DIR:-/opt/yuehou}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${YUEHOU_HOST_PROJECT_DIR:-.}:${YUEHOU_HOST_PROJECT_DIR:-/opt/yuehou}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yuehou-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
